        /* ✅ RESET & BASE MOBILE-FIRST */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            touch-action: manipulation;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            position: relative;
        }

        /* ✅ RESPONSIVE HAPPY BIRTHDAY TEXT */
        #birthday-text {
            position: fixed;
            top: clamp(20px, 5vh, 50px);
            left: 50%;
            transform: translateX(-50%);
            font-size: clamp(1.8rem, 8vw, 4rem);
            font-weight: 800;
            color: #fff;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.6);
            z-index: 1000;
            text-align: center;
            animation: glow 2s ease-in-out infinite alternate;
            letter-spacing: 0.05em;
            line-height: 1.1;
        }

        @keyframes glow {
            from { 
                text-shadow: 2px 2px 8px rgba(0,0,0,0.6), 0 0 20px #ff6b6b;
            }
            to { 
                text-shadow: 2px 2px 8px rgba(0,0,0,0.6), 0 0 40px #ff1493, 0 0 60px #ff69b4;
            }
        }

        /* ✅ ⭐ ÁNH CHÍNH GIỮA TUYỆT ĐỐI ⭐ */
        #main-image {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            /* ✅ Responsive size hoàn hảo */
            width: clamp(220px, 38vw, 380px);
            height: clamp(260px, 38vw, 320px);
            /* ✅ Background với ảnh thật của bạn */
            background: 
                /* Layer bóng đổ */
                radial-gradient(circle at 30% 20%, rgba(255,255,255,0.3) 0%, transparent 50%),
                /* Layer ánh sáng */

                /* Layer chính - thay 1.png bằng ảnh thật */
                url('1.png') center/contain no-repeat,
                /* Fallback SVG cake */
                linear-gradient(145deg, #ffdbac, #ffc893),
                url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDAwIiBoZWlnaHQ9IjMwMCIgdmlld0JveD0iMCAwIDQwMCAzMDAiIGZpbGw9Im5vbmUiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+CjxyZWN0IHg9IjQwIiB5PSIyNDAiIHdpZHRoPSIzMjAiIGhlaWdodD0iNjAiIHJ4PSI1IiBmaWxsPSIjZmZkNDY0IiBzdHJva2U9IiNmZmI5NTMiIHN0cm9rZS13aWR0aD0iMyIvPgo8cmVjdCB4PSI2MCIgeT0iMTkwIiB3aWR0aD0iMjgwIiBoZWlnaHQ9IjUwIiByeD0iMTAiIGZpbGw9IiNmZjhhNmIiIHN0cm9rZT0iI2ZmNzU0ZiIgc3Ryb2tlLXdpZHRoPSIyIi8+CjxyZWN0IHg9IjgwIiB5PSIxNDAiIHdpZHRoPSIyNDAiIGhlaWdodD0iNTAiIHJ4PSIxMiIgZmlsbD0iI2ZmNjVhZiIgc3Ryb2tlPSIjZmY1MThjIiBzdHJva2Utd2lkdGg9IjIiLz4KPHJlY3QgeD0iMTAwIiB5PSIxMDAiIHdpZHRoPSIxODAiIGhlaWdodD0iNDAiIHJ4PSIxMCIgZmlsbD0iI2ZmNDI0OCIgc3Ryb2tlPSIjZmUzZDBkIiBzdHJva2Utd2lkdGg9IjIiLz4KPGNpcmNsZSBjeD0iMjAwIiBjeT0iODAiIHI9IjM1IiBmaWxsPSIjZmZiY2NmIiBzdHJva2U9IiNmZmFiOWIiIHN0cm9rZS13aWR0aD0iMyIvPgo8Y2lyY2xlIGN4PSIxNjAiIGN5PSI1NSIgcj0iMjUiIGZpbGw9IiNmZmIxY2YiIHN0cm9rZT0iI2ZmOTdiYSIgc3Ryb2tlLXdpZHRoPSIyIi8+CjxjaXJjbGUgY3g9IjI0MCIgY3k9IjU1IiByPSIyNSIgZmlsbD0iI2ZmYjFjZiIgc3Ryb2tlPSIjZmY5N2JhIiBzdHJva2Utd2lkdGg9IjIiLz4KPHBhdGggZD0iTTE3NSAxMjAgTDE5NSAxNDAgTDIxNSAxMjAiIHN0cm9rZT0iI2ZmZiIgc3Ryb2tlLXdpZHRoPSI0IiBzdHJva2UtbGluZWNhcD0icm91bmQiLz4KPGNpcmNsZSBjeD0iMTc1IiBjeT0iMTE1IiByPSI2IiBmaWxsPSIjZmZmIi8+CjxjaXJjbGUgY3g9IjIxNSIgY3k9IjExNSIgcj0iNiIgZmlsbD0iI2ZmZiIvPgo8L3N2Zz4=') center/contain no-repeat;
            box-shadow: 
                0 20px 50px rgba(0,0,0,0.4),
                inset 0 2px 10px rgba(255,255,255,0.3);
            border-radius: 25px;
            z-index: 500;
            animation: float 4s ease-in-out infinite;
        }

        /* ✅ LUÔN GIỮA TUYỆT ĐỐI - KHÔNG CẢNH BÁO */
        #main-image::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: inherit;
            border-radius: inherit;
            z-index: -1;
        }

        @keyframes float {
            0%, 100% { transform: translate(-50%, -50%) translateY(0px); }
            50% { transform: translate(-50%, -50%) translateY(-15px); }
        }

        /* ✅ RESPONSIVE WISHES */
        #wishes {
            position: fixed;
            top: clamp(68%, 75%, 78%);
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #fff;
            z-index: 600;
            max-width: clamp(280px, 92vw, 500px);
            font-size: clamp(0.95rem, 3.2vw, 1.3rem);
            line-height: 1.5;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
            animation: fadeInUp 2s ease-out 1s both;
            padding: 0 12px;
        }

        @keyframes fadeInUp {
            0% { opacity: 0; transform: translate(-50%, 40px); }
            100% { opacity: 1; transform: translate(-50%, -50%); }
        }

        .wish-line {
            margin: clamp(6px, 1vw, 10px) 0;
            opacity: 0;
            animation: slideIn 1s ease-out forwards;
        }

        .wish-line:nth-child(1) { animation-delay: 1.2s; }
        .wish-line:nth-child(2) { animation-delay: 1.5s; }
        .wish-line:nth-child(3) { animation-delay: 1.8s; }
        .wish-line:nth-child(4) { animation-delay: 2.1s; }

        @keyframes slideIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* ✅ BALLOONS RESPONSIVE */
        .balloon {
            position: fixed;
            width: clamp(35px, 6vw, 50px);
            height: clamp(45px, 7vw, 60px);
            cursor: pointer;
            z-index: 300;
            transition: all 0.2s ease;
        }

        .balloon:hover, .balloon:active {
            transform: scale(1.15) rotate(5deg);
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) scale(0.8);
                opacity: 1;
            }
            100% {
                transform: translateY(-120px) scale(1.1);
                opacity: 0;
            }
        }

        /* ✅ CURSOR FOR DESKTOP - TOUCH FOR MOBILE */
        #cursor {
            position: fixed;
            width: clamp(28px, 5vw, 35px);
            height: clamp(28px, 5vw, 35px);
            background: linear-gradient(45deg, #ff6b6b, #ff8e8e);
            border: 3px solid #fff;
            border-radius: 50%;
            box-shadow: 
                0 4px 12px rgba(255,107,107,0.5),
                inset 0 1px 3px rgba(255,255,255,0.4);
            z-index: 2000;
            pointer-events: none;
            transition: all 0.08s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(14px, 3vw, 18px);
        }

        #cursor::after {
            content: '🎁';
        }

        /* ✅ FIREWORKS & RIPPLE */
        .firework, .firework-particle, .ripple {
            position: fixed;
            pointer-events: none;
            z-index: 1500;
        }

        .firework-particle {
            border-radius: 50%;
            box-shadow: 0 0 8px currentColor;
        }

        .ripple {
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.9), transparent);
            transform: scale(0);
            animation: rippleEffect 0.6s linear;
        }

        @keyframes rippleEffect {
            to { transform: scale(3.5); opacity: 0; }
        }

        /* ✅ TABLET/DESKTOP */
        @media (min-width: 768px) {
            #birthday-text { font-size: clamp(3rem, 8vw, 5rem); }
            #wishes { font-size: clamp(1.1rem, 2.5vw, 1.4rem); }
            #main-image { 
                width: clamp(300px, 40vw, 420px);
                height: clamp(300px, 40vw, 360px);
            }
        }

        /* ✅ LANDSCAPE */
        @media (max-height: 500px) and (orientation: landscape) {
            #birthday-text { top: 15px; font-size: clamp(1.5rem, 6vw, 2.8rem); }
            #wishes { top: 58%; font-size: clamp(0.85rem, 2.8vw, 1.1rem); }
        }
    </style>
</head>
<body>
    <!-- Happy Birthday -->
    <div id="birthday-text">Happy Birthday Ngọc Kiều! 🎉</div>

    <!-- ⭐ ÁNH CHÍNH GIỮA TUYỆT ĐỐI ⭐ -->
    <div id="main-image">
        <!-- Ảnh 1.png sẽ tự động load và luôn ở giữa -->
    </div>

    <!-- Lời chúc -->
    <div id="wishes">
        <div class="wish-line">🎉 Chúc bạn một ngày sinh nhật thật vui vẻ! 🎉</div>
        <div class="wish-line">💝 Luôn hạnh phúc và thành công trong mọi điều! 💝</div>
        <div class="wish-line">🌟 Chúc bạn E iu của bạn là của tôi! 🌟</div>
        <div class="wish-line">🥳 Đỗ NV1 & Best Wishes! 🥳</div>
    </div>

    <!-- Cursor -->
    <div id="cursor"></div>

    <script>
        // ✅ TOUCH DETECTION
        const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

        // Tạo bóng bay
        function createBalloon() {
            const balloon = document.createElement('div');
            balloon.className = 'balloon';
            balloon.style.left = Math.random() * (window.innerWidth - 60) + 'px';
            balloon.style.animation = `floatUp ${4 + Math.random() * 3}s linear infinite`;
            balloon.style.animationDelay = `${Math.random() * 3}s`;
            
            balloon.innerHTML = `
                <svg viewBox="0 0 100 120" style="width:100%;height:100%;">
                    <path d="M50 20 C35 5, 20 20, 25 40 C20 60, 30 80, 50 95 C70 80, 80 60, 75 40 C80 20, 65 5, 50 20 Z" 
                          fill="${['#ff6b6b', '#ff8e8e', '#ff6b9d', '#c44569', '#ff1493'][Math.floor(Math.random()*5)]}" 
                          stroke="#fff" stroke-width="2" stroke-linejoin="round"/>
                    <path d="M50 20 C60 10, 75 20, 70 40 C75 55, 65 70, 50 85 C35 70, 25 55, 30 40 C25 20, 40 10, 50 20 Z" 
                          fill="${['#ff6b6b', '#ff8e8e', '#ff6b9d', '#c44569', '#ff1493'][Math.floor(Math.random()*5)]}" 
                          stroke="#fff" stroke-width="2" stroke-linejoin="round"/>
                    <line x1="50" y1="95" x2="50" y2="115" stroke="#333" stroke-width="2" stroke-linecap="round"/>
                </svg>
            `;
            
            ['click', isTouchDevice ? 'touchstart' : 'click'].forEach(event => {
                balloon.addEventListener(event, explodeBalloon, { passive: true });
            });
            
            document.body.appendChild(balloon);
            setTimeout(() => balloon?.remove(), 9000);
        }

        // Pháo hoa khi click/touch
        function explodeBalloon(e) {
            e.preventDefault();
            const rect = e.currentTarget.getBoundingClientRect();
            createFirework(rect.left + rect.width/2, rect.top + rect.height/2);
            e.currentTarget.style.transform = 'scale(1.4)';
            setTimeout(() => e.currentTarget.remove(), 200);
        }

        function createFirework(x, y) {
            const colors = ['#ff6b6b','#4ecdc4','#45b7d1','#f9ca24','#f0932b','#eb4d4b','#6c5ce7','#a29bfe','#fdcb6e','#ff9ff3'];
            const count = window.innerWidth > 768 ? 28 : 18;
            
            for (let i = 0; i < count; i++) {
                const particle = document.createElement('div');
                particle.className = 'firework-particle';
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                particle.style.width = '6px';
                particle.style.height = '6px';
                particle.style.background = colors[Math.floor(Math.random()*colors.length)];
                
                const angle = Math.PI * 2 * Math.random();
                const vel = (window.innerWidth > 768 ? 120 : 80) + Math.random() * 80;
                particle.animate([
                    { transform: 'scale(1)', opacity: 1 },
                    { transform: `translate(${Math.cos(angle)*vel}px, ${Math.sin(angle)*vel}px) scale(0)`, opacity: 0 }
                ], { duration: 800 + Math.random()*600, easing: 'cubic-bezier(0.25,0.46,0.45,0.94)' }).onfinish = () => particle.remove();
                
                document.body.appendChild(particle);
            }
        }

        // ✅ MOUSE &
